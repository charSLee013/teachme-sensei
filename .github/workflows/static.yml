name: Verify and deploy static content to Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify public site
        run: npm run verify:public

      - name: Verify workflow contract
        run: npm run verify:workflow

      - name: Verify Krea2 adapter
        run: npm run test:krea2-adapter

      - name: Verify sync fixture
        run: npm run test:sync-fixture

  smoke:
    needs: static
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Start HTTP server
        run: |
          python3 -m http.server 4173 --directory docs > server.log 2>&1 &
          echo $! > server.pid
          curl --fail --retry 15 --retry-delay 1 http://127.0.0.1:4173/index.html

      - name: Run Chromium smoke
        run: npm run smoke:public

      - name: Stop HTTP server
        if: always()
        run: |
          if [ -f server.pid ]; then kill "$(cat server.pid)" || true; fi

      - name: Save smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-site-smoke-input
          path: |
            playwright-report
            test-results
            server.log
          if-no-files-found: warn
          retention-days: 14

  report:
    needs: [static, smoke]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download smoke artifacts
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: public-site-smoke-input
          path: smoke-artifacts

      - name: Upload smoke report
        id: upload-smoke-artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-site-smoke
          path: smoke-artifacts
          if-no-files-found: error
          retention-days: 14

      - name: Gate report
        if: always()
        run: |
          if [ "${{ needs.static.result }}" != "success" ] || [ "${{ needs.smoke.result }}" != "success" ] || [ "${{ steps.upload-smoke-artifacts.outcome }}" != "success" ]; then
            echo "Static verification, smoke, or artifact upload failed."
            exit 1
          fi

  deploy:
    needs: [static, smoke, report]
    if: needs.static.result == 'success' && needs.smoke.result == 'success' && needs.report.result == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
